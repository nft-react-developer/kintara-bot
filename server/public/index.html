<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kintara Bot Dashboard</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Kintara Bot</p>
        <h1>Dashboard</h1>
        <p class="muted">Read-only status from mounted recon directories.</p>
      </div>
      <button id="refreshBtn" type="button">Refresh</button>
    </header>

    <section id="summary" class="summary"></section>
    <section id="bots" class="grid"></section>

    <section class="logs-panel">
      <div class="logs-toolbar">
        <h2>Logs</h2>
        <select id="botSelect"></select>
        <select id="logSelect"></select>
      </div>
      <pre id="logOutput">Select a bot log...</pre>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
